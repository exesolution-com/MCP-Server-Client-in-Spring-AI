services:

  # ================================================================
  # MCP Tool Server
  # Exposes @McpTool-annotated tools over Streamable HTTP at /mcp
  # Admin endpoint: GET /admin/tools (Basic auth: admin / admin-secret)
  # ================================================================
  mcp-tool-server:
    build:
      context: .
      dockerfile: mcp-tool-server/Dockerfile
    container_name: mcp-tool-server
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mcp-net

  # ================================================================
  # AI Chat Service
  # User-facing REST API; connects to mcp-tool-server via MCP client
  # Chat endpoint: POST /api/chat (Basic auth: user / user-secret)
  # Requires OPENAI_API_KEY set in .env or environment
  # ================================================================
  ai-chat-service:
    build:
      context: .
      dockerfile: ai-chat-service/Dockerfile
    container_name: ai-chat-service
    ports:
      - "8081:8081"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MCP_SERVER_URL: http://mcp-tool-server:8080
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      mcp-tool-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mcp-net

networks:
  mcp-net:
    driver: bridge
